name: Auto-Generate Content with Claude

on:
  # Run weekly on Monday at 9am UTC
  schedule:
    - cron: '0 9 * * 1'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      industry:
        description: 'Industry to generate guide for (leave empty for batch)'
        required: false
        type: string

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install @anthropic-ai/sdk
      
      - name: Generate new guide
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.industry }}" ]; then
            node scripts/auto-update-content.js --industry "${{ github.event.inputs.industry }}"
          else
            # Generate one guide per week from the queue
            node scripts/auto-update-content.js --batch
          fi
      
      - name: Commit and create PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat: Add new resource guide (auto-generated)'
          title: '🤖 New Resource Guide - Auto-Generated by Claude'
          body: |
            ## Auto-Generated Content
            
            This PR was automatically created by the content generation workflow using Claude API.
            
            **Please review:**
            - [ ] Content quality and accuracy
            - [ ] SEO metadata (title, description, keywords)
            - [ ] Revenue metrics make sense
            - [ ] alaii integration mentions are natural
            - [ ] Grammar and formatting
            
            **Files changed:**
            - Updated `GuidePage.tsx` with new guide content
            - Updated `ResourcesPage.tsx` with new card
            - Updated `sitemap.xml` with new URL
            
            ---
            Generated on: ${{ github.run_id }}
          branch: auto-content-update-${{ github.run_number }}
          delete-branch: true
          labels: |
            auto-generated
            content
            needs-review
